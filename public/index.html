<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEX Management Inventory – sign in to manage your inventory efficiently." />
  <title>Login – DEX Management Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">

    <main class="form-panel">

      <!-- Top brand bar -->
      <div class="top-brand">
        <div class="top-logo" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="52" height="52" rx="13" fill="#78A4CB"/>
            <rect x="13" y="13" width="10" height="10" rx="2" fill="#B4E1EB"/>
            <rect x="29" y="13" width="10" height="10" rx="2" fill="#B4E1EB"/>
            <rect x="13" y="29" width="10" height="10" rx="2" fill="#B4E1EB"/>
            <rect x="29" y="29" width="10" height="10" rx="2" fill="#FFFFFF"/>
          </svg>
        </div>
        <span class="top-brand-name">DEX Management Inventory</span>
      </div>

      <div class="form-card">

        <!-- CTA hero section -->
        <div class="cta-block">
          <h1 class="cta-title">Manage your inventory<br /><span class="cta-accent">smarter & faster.</span></h1>
          <p class="cta-sub">Sign in to access real-time stock tracking, supplier management, and analytics — all in one place.</p>
          <div class="cta-badges">
            <span class="badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              Real-time stock
            </span>
            <span class="badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              Supplier tracking
            </span>
            <span class="badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              Analytics & reports
            </span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Login form -->
        <div class="form-section">
          <header class="form-header">
            <h2 class="form-title">Welcome back</h2>
            <p class="form-subtitle">Enter your credentials to continue</p>
          </header>

          <form id="loginForm" novalidate autocomplete="off">
            <div class="field-group">
              <label for="username" class="field-label">Username</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                </span>
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="field-input"
                  placeholder="Enter your username"
                  autocomplete="username"
                  required
                />
              </div>
            </div>

            <div class="field-group">
              <label for="password" class="field-label">Password</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                </span>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="field-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" id="togglePassword" class="toggle-pass" aria-label="Toggle password visibility">
                  <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Status message -->
            <div id="statusMsg" class="status-msg" role="alert" aria-live="polite"></div>

            <button type="submit" id="loginBtn" class="btn-login">
              <span id="btnText">Sign In</span>
              <span id="btnSpinner" class="spinner hidden" aria-hidden="true"></span>
            </button>
          </form>
        </div>

      </div>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
