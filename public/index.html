<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure login portal for JDonloder – enter your username and password to access the system." />
  <title>Login – JDonloder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Left panel: branding -->
    <aside class="brand-panel" aria-hidden="true">
      <div class="brand-inner">
        <div class="brand-logo">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="52" height="52" rx="14" fill="#78A4CB"/>
            <path d="M14 26C14 19.373 19.373 14 26 14C32.627 14 38 19.373 38 26C38 32.627 32.627 38 26 38C19.373 38 14 32.627 14 26Z" fill="#B4E1EB"/>
            <path d="M26 20V26L30 30" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="brand-name">JDonloder</h1>
        <p class="brand-tagline">Secure Access Portal</p>
        <ul class="brand-features" aria-label="Features">
          <li>
            <span class="feature-dot"></span>
            Reliable authentication
          </li>
          <li>
            <span class="feature-dot"></span>
            Login activity logging
          </li>
          <li>
            <span class="feature-dot"></span>
            Powered by Neon PostgreSQL
          </li>
        </ul>
      </div>
    </aside>

    <!-- Right panel: login form -->
    <main class="form-panel">
      <div class="form-card">
        <header class="form-header">
          <div class="form-logo-mobile" aria-hidden="true">
            <svg width="38" height="38" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="52" height="52" rx="14" fill="#78A4CB"/>
              <path d="M14 26C14 19.373 19.373 14 26 14C32.627 14 38 19.373 38 26C38 32.627 32.627 38 26 38C19.373 38 14 32.627 14 26Z" fill="#B4E1EB"/>
              <path d="M26 20V26L30 30" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2 class="form-title">Welcome back</h2>
          <p class="form-subtitle">Sign in to your account</p>
        </header>

        <form id="loginForm" novalidate autocomplete="off">
          <div class="field-group">
            <label for="username" class="field-label">Username</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                class="field-input"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="field-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" id="togglePassword" class="toggle-pass" aria-label="Toggle password visibility">
                <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Status message -->
          <div id="statusMsg" class="status-msg" role="alert" aria-live="polite"></div>

          <button type="submit" id="loginBtn" class="btn-login">
            <span id="btnText">Login</span>
            <span id="btnSpinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>

        <footer class="form-footer">
          <p class="footer-note">Default credentials for testing:<br /><code>admin / admin123</code> or <code>udomain / password</code></p>
        </footer>
      </div>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
