<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEX Inventory – Dashboard" />
  <title>Dashboard – DEX Management Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #78A4CB;
      --secondary: #95BDD7;
      --accent:    #B4E1EB;
      --white:     #FFFFFF;
      --text-dark: #1A2B3C;
      --text-mid:  #3D5A73;
      --text-light:#6B8FA8;
      --border:    #C8DDE9;
      --shadow:    rgba(120,164,203,0.20);
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background-color: var(--accent);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .welcome-card {
      background-color: var(--white);
      border-radius: 16px;
      box-shadow: 0 10px 40px var(--shadow);
      max-width: 500px;
      width: 100%;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card top strip */
    .card-top {
      background-color: var(--primary);
      padding: 32px 40px 28px;
      text-align: center;
    }

    .check-icon {
      width: 64px;
      height: 64px;
      background-color: var(--secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .check-icon svg {
      color: var(--white);
    }

    .welcome-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .welcome-title span {
      color: var(--accent);
    }

    .welcome-sub {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.80);
      line-height: 1.6;
    }

    /* Card body */
    .card-body {
      padding: 32px 40px 36px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background-color: #F4F9FC;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .info-icon {
      width: 36px;
      height: 36px;
      background-color: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon svg {
      color: var(--white);
    }

    .info-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
    }

    .info-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 24px;
      padding: 12px 28px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      background-color: var(--primary);
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .btn-logout:hover {
      background-color: var(--secondary);
      transform: translateY(-1px);
    }

    .btn-logout:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .card-top  { padding: 26px 22px 22px; }
      .card-body { padding: 24px 22px 28px; }
      .welcome-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="welcome-card" role="main">

    <div class="card-top">
      <div class="check-icon" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="welcome-title">Welcome to dashboard <span>DEX Inventory</span></h1>
      <p class="welcome-sub">You are successfully logged in.</p>
    </div>

    <div class="card-body">
      <div class="info-row">
        <div class="info-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="info-text">
          <span class="info-label">Logged in as</span>
          <span class="info-value" id="usernameInfo">—</span>
        </div>
      </div>

      <div class="info-row">
        <div class="info-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="info-text">
          <span class="info-label">Login time (WIB)</span>
          <span class="info-value" id="loginTime">—</span>
        </div>
      </div>

      <a href="/" class="btn-logout" id="logoutBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Back to Login
      </a>
    </div>

  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const user = params.get('user') || 'User';
      const safeUser = user.replace(/[<>"'&]/g, '');
      document.getElementById('usernameInfo').textContent = safeUser;

      const now = new Date();
      const options = {
        timeZone: 'Asia/Jakarta',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      };
      document.getElementById('loginTime').textContent =
        now.toLocaleString('id-ID', options) + ' WIB';
    })();
  </script>
</body>
</html>
